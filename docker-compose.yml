version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: moex_db
    restart: always
    environment:
      POSTGRES_DB: moex_db
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - moex_network

  cache:
    image: redis:7-alpine
    container_name: moex_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - moex_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moex_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres_user
      - DB_PASSWORD=postgres_password
      - DB_NAME=moex_db
    depends_on:
      - db
      - cache
    networks:
      - moex_network

  collector:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moex_collector
    restart: always
    command: python collector/moex_collector.py
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres_user
      - DB_PASSWORD=postgres_password
      - DB_NAME=moex_db
    depends_on:
      - db
    networks:
      - moex_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: moex_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - moex_network

volumes:
  postgres_data:
  redis_data:

networks:
  moex_network:
    driver: bridge